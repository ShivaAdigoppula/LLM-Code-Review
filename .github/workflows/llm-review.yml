name: LLM Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt

      - name: Show diff info
        run: |
          echo "Diff file created"
          wc -l diff.txt
          head -n 20 diff.txt

      - name: Run review script
        run: |
          python scripts/review_code.py

      - name: Upload diff artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-diff
          path: diff.txt


      - name: Upload review output
        uses: actions/upload-artifact@v4
        with:
          name: review-output
          path: review_output.md

